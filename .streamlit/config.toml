[theme]
base = "light"
primaryColor = "#C9A227"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#0B2545"
font = "sans serif"

[server]
headless = true
runOnSave = false
enableXsrfProtection = true
maxUploadSize = 20

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
